<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maker Radio - Digital Marquee</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background-color: #000000;
  }

  /* The container sets the stage */
  .signage-stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    background-color: #000000;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer; /* Indicates the screen is clickable/tappable */
  }

  /* Both flyer layers sit perfectly on top of each other */
  .flyer-layer {
    position: absolute;
    max-height: 100%;
    max-width: 100%;
    object-fit: contain;
    
    /* Hardware-accelerated transitions for perfectly smooth motion */
    transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), 
                transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: opacity, transform;
  }

  /* --- TRANSITION STYLES --- */
  
  /* State 1: Active and visible */
  .active {
    opacity: 1;
    transform: scale(1);
    z-index: 2;
  }

  /* State 2: Hidden/Transitioned out (Cinematic Fade + Subtle Zoom Out) */
  .hidden {
    opacity: 0;
    transform: scale(0.95);
    z-index: 1;
  }
</style>
</head>
<body>

  <div class="signage-stage" id="stage">
    <img id="layerA" class="flyer-layer active" src="Marquee/flyer_1.png" alt="Signage Display">
    <img id="layerB" class="flyer-layer hidden" src="" alt="Signage Display">
  </div>

<script>
  // ==========================================
  // --- SIGNAGE PLAYLIST CONFIGURATION -------
  // ==========================================
  const flyerPlaylist = [
    "Marquee/flyer_1.png", 
    "Marquee/flyer_2.png",  
    "Marquee/flyer_3.png",
    "Marquee/flyer_4.png",
    "Marquee/flyer_5.png",
    "Marquee/flyer_6.png"
  ];

  // How long each flyer stays on screen (20000ms = 20 seconds)
  const displayDuration = 20000; 
  // ==========================================

  let currentIndex = 0;
  const layerA = document.getElementById("layerA");
  const layerB = document.getElementById("layerB");
  const stage = document.getElementById("stage");
  
  let isLayerAActive = true;
  let rotationInterval = null;
  const cachedImages = [];
  
  // Track network validation tokens to verify backend modifications accurately
  let initialETag = null;
  let initialLastModified = null;

  // 1. IMMEDIATE PRE-CACHING & INITIAL HEADERS CAPTURE
  function preCacheImages() {
    flyerPlaylist.forEach((src) => {
      const img = new Image();
      img.src = src;
      cachedImages.push(img);
    });
  }
  
  async function captureInitialFileTokens() {
    try {
      // Grab headers on initial boot so we have a reference point
      const response = await fetch(window.location.href, { method: 'HEAD', cache: 'no-store' });
      initialETag = response.headers.get('ETag');
      initialLastModified = response.headers.get('Last-Modified');
    } catch (e) {
      console.error("Failed to capture initial file signatures", e);
    }
  }
  
  preCacheImages();
  captureInitialFileTokens();

  // 2. ROTATION LOGIC
  function rotateFlyers() {
    let loopResetOccurred = false;

    if (currentIndex === flyerPlaylist.length - 1) {
      currentIndex = 0;
      loopResetOccurred = true;
    } else {
      currentIndex++;
    }

    const nextImageSrc = flyerPlaylist[currentIndex];

    if (isLayerAActive) {
      layerB.src = nextImageSrc;
      setTimeout(() => {
        layerA.className = "flyer-layer hidden";
        layerB.className = "flyer-layer active";
      }, 50);
    } else {
      layerA.src = nextImageSrc;
      setTimeout(() => {
        layerB.className = "flyer-layer hidden";
        layerA.className = "flyer-layer active";
      }, 50);
    }

    isLayerAActive = !isLayerAActive;

    // Check for real backend script updates safely after the slide is long done transitioning
    if (loopResetOccurred) {
      setTimeout(async () => {
        const updated = await checkForUpdates();
        if (updated) {
          location.reload();
        }
      }, 3000); 
    }
  }

  // 3. RELIABLE UPDATE CHECK VIA HTTP HEADERS
  async function checkForUpdates() {
    try {
      // Use HEAD request to check headers without wasting bandwidth downloading the file text
      const response = await fetch(window.location.href, { method: 'HEAD', cache: 'no-store' });
      if (!response.ok) return false;
      
      const newETag = response.headers.get('ETag');
      const newLastModified = response.headers.get('Last-Modified');
      
      // If either token exists and doesn't match our boot config, the file changed on disk
      if (initialETag && newETag && initialETag !== newETag) return true;
      if (initialLastModified && newLastModified && initialLastModified !== newLastModified) return true;
      
      return false;
    } catch (e) {
      console.error("Update check failed:", e);
      return false;
    }
  }

  // 4. TIMER MANAGEMENT
  function startTimer() {
    if (flyerPlaylist.length > 1) {
      rotationInterval = setInterval(rotateFlyers, displayDuration);
    } else {
      rotationInterval = setTimeout(() => { location.reload(); }, displayDuration);
    }
  }

  function resetTimer() {
    clearInterval(rotationInterval);
    clearTimeout(rotationInterval);
    startTimer();
  }

  // 5. INTERACTION EVENT (Skip on Click)
  stage.addEventListener("click", () => {
    rotateFlyers();
    resetTimer();
  });

  startTimer();
</script>

</body>
</html>
