<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maker Radio - Digital Marquee</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background-color: #000000;
  }

  /* The container sets the stage */
  .signage-stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    background-color: #000000;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Both flyer layers sit perfectly on top of each other */
  .flyer-layer {
    position: absolute;
    max-height: 100%;
    max-width: 100%;
    object-fit: contain;
    
    /* Hardware-accelerated transitions for perfectly smooth motion */
    transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), 
                transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: opacity, transform;
  }

  /* --- COOL TRANSITION STYLES --- */
  
  /* State 1: Active and visible */
  .active {
    opacity: 1;
    transform: scale(1) rotate(0deg);
    z-index: 2;
  }

  /* State 2: Hidden/Transitioned out (Cinematic Fade + Subtle Zoom Out) */
  .hidden {
    opacity: 0;
    transform: scale(0.95);
    z-index: 1;
  }
</style>
</head>
<body>

  <div class="signage-stage">
    <img id="layerA" class="flyer-layer active" src="flyer1.png" alt="Signage Display">
    <img id="layerB" class="flyer-layer hidden" src="flyer2.png" alt="Signage Display">
  </div>

<script>
  // ==========================================
  // --- SIGNAGE PLAYLIST CONFIGURATION -------
  // ==========================================
  const flyerPlaylist = [
    "flyer1.png", // Run4Salmon Fundraiser
    "flyer2.png"  // Live Music Showcase
  ];

  // How long each flyer stays on screen (20000ms = 20 seconds)
  const displayDuration = 20000; 
  // ==========================================

  let currentIndex = 0;
  const layerA = document.getElementById("layerA");
  const layerB = document.getElementById("layerB");
  
  // Track which layer is currently on top
  let isLayerAActive = true;

  function rotateFlyers() {
    // 1. Calculate the next index
    currentIndex = (currentIndex + 1) % flyerPlaylist.length;
    const nextImageSrc = flyerPlaylist[currentIndex];

    if (isLayerAActive) {
      // Layer A is showing. Prepare Layer B behind it, then fade Layer B in / Layer A out
      layerB.src = nextImageSrc;
      
      // Give the browser a split second to register the new source image
      setTimeout(() => {
        layerA.className = "flyer-layer hidden";
        layerB.className = "flyer-layer active";
      }, 50);
    } else {
      // Layer B is showing. Prepare Layer A behind it, then fade Layer A in / Layer B out
      layerA.src = nextImageSrc;
      
      setTimeout(() => {
        layerB.className = "flyer-layer hidden";
        layerA.className = "flyer-layer active";
      }, 50);
    }

    // Toggle our layer tracker
    isLayerAActive = !isLayerAActive;
  }

  // Pre-load the next image immediately if there are multiple images
  if (flyerPlaylist.length > 1) {
    setInterval(rotateFlyers, displayDuration);
  }
</script>

</body>
</html>
