<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maker Radio - Digital Marquee</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background-color: #000000;
  }

  /* The container sets the stage */
  .signage-stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    background-color: #000000;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer; /* Indicates the screen is clickable/tappable */
  }

  /* Both flyer layers sit perfectly on top of each other */
  .flyer-layer {
    position: absolute;
    max-height: 100%;
    max-width: 100%;
    object-fit: contain;
    
    /* Hardware-accelerated transitions for perfectly smooth motion */
    transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), 
                transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: opacity, transform;
  }

  /* --- TRANSITION STYLES --- */
  
  /* State 1: Active and visible */
  .active {
    opacity: 1;
    transform: scale(1);
    z-index: 2;
  }

  /* State 2: Hidden/Transitioned out (Cinematic Fade + Subtle Zoom Out) */
  .hidden {
    opacity: 0;
    transform: scale(0.95);
    z-index: 1;
  }
</style>
</head>
<body>

  <div class="signage-stage" id="stage">
    <img id="layerA" class="flyer-layer active" src="flyer1.png" alt="Signage Display">
    <img id="layerB" class="flyer-layer hidden" src="" alt="Signage Display">
  </div>

<script>
  // ==========================================
  // --- SIGNAGE PLAYLIST CONFIGURATION -------
  // ==========================================
  const flyerPlaylist = [
    "flyer1.png", 
    "flyer2.png",  
    "flyer3.png",
    "flyer6.png",
    "flyer5.png",
    "flyer7a.png"
  ];

  // How long each flyer stays on screen (20000ms = 20 seconds)
  const displayDuration = 20000; 
  // ==========================================

  let currentIndex = 0;
  const layerA = document.getElementById("layerA");
  const layerB = document.getElementById("layerB");
  const stage = document.getElementById("stage");
  
  let isLayerAActive = true;
  let rotationInterval = null;
  const cachedImages = [];

  // 1. IMMEDIATE PRE-CACHING
  function preCacheImages() {
    flyerPlaylist.forEach((src) => {
      const img = new Image();
      img.src = src;
      cachedImages.push(img);
    });
  }
  preCacheImages();

  // 2. ROTATION LOGIC
  function rotateFlyers() {
    let loopResetOccurred = false;

    // Determine the next index instantly
    if (currentIndex === flyerPlaylist.length - 1) {
      currentIndex = 0;
      loopResetOccurred = true;
    } else {
      currentIndex++;
    }

    const nextImageSrc = flyerPlaylist[currentIndex];

    // Execute the CSS swap instantly with zero network delay
    if (isLayerAActive) {
      layerB.src = nextImageSrc;
      setTimeout(() => {
        layerA.className = "flyer-layer hidden";
        layerB.className = "flyer-layer active";
      }, 50);
    } else {
      layerA.src = nextImageSrc;
      setTimeout(() => {
        layerB.className = "flyer-layer hidden";
        layerA.className = "flyer-layer active";
      }, 50);
    }

    isLayerAActive = !isLayerAActive;

    // If we just cycled back to the beginning, check for updates 
    // *after* the transition animation has already safely fired.
    if (loopResetOccurred) {
      setTimeout(async () => {
        const updated = await checkForUpdates();
        if (updated) {
          location.reload();
        }
      }, 2000); // 2 second delay ensures the 1.2s transition finishes beautifully first
    }
  }

  // 3. SILENT CODE CHECK
  async function checkForUpdates() {
    try {
      const response = await fetch(window.location.href, { cache: "no-store" });
      if (!response.ok) return false;
      
      const serverHtml = await response.text();
      const currentHtml = document.documentElement.outerHTML;
      
      return serverHtml.length !== currentHtml.length;
    } catch (e) {
      console.error("Update check failed:", e);
      return false;
    }
  }

  // 4. TIMER MANAGEMENT
  function startTimer() {
    if (flyerPlaylist.length > 1) {
      rotationInterval = setInterval(rotateFlyers, displayDuration);
    } else {
      rotationInterval = setTimeout(() => { location.reload(); }, displayDuration);
    }
  }

  function resetTimer() {
    clearInterval(rotationInterval);
    clearTimeout(rotationInterval);
    startTimer();
  }

  // 5. INTERACTION EVENT (Skip on Click)
  stage.addEventListener("click", () => {
    rotateFlyers();
    resetTimer();
  });

  // Start the sign engine
  startTimer();
</script>

</body>
</html>
