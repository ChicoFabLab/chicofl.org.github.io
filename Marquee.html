<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maker Radio - Digital Marquee</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background-color: #000000;
  }

  /* The container sets the stage */
  .signage-stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    background-color: #000000;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Both flyer layers sit perfectly on top of each other */
  .flyer-layer {
    position: absolute;
    max-height: 100%;
    max-width: 100%;
    object-fit: contain;
    
    /* Hardware-accelerated transitions for perfectly smooth motion */
    transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), 
                transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: opacity, transform;
  }

  /* --- TRANSITION STYLES --- */
  
  /* State 1: Active and visible */
  .active {
    opacity: 1;
    transform: scale(1);
    z-index: 2;
  }

  /* State 2: Hidden/Transitioned out (Cinematic Fade + Subtle Zoom Out) */
  .hidden {
    opacity: 0;
    transform: scale(0.95);
    z-index: 1;
  }
</style>
</head>
<body>

  <div class="signage-stage">
    <img id="layerA" class="flyer-layer active" src="flyer1.png" alt="Signage Display">
    <img id="layerB" class="flyer-layer hidden" src="flyer2.png" alt="Signage Display">
  </div>

<script>
  // ==========================================
  // --- SIGNAGE PLAYLIST CONFIGURATION -------
  // ==========================================
  // Add as many flyers as you want here
  const flyerPlaylist = [
    "flyer1.png", 
    "flyer2.png",  
    "flyer3.png",
    "flyer4.png"
  ];

  // How long each flyer stays on screen (20000ms = 20 seconds)
  const displayDuration = 20000; 
  // ==========================================

  let currentIndex = 0;
  const layerA = document.getElementById("layerA");
  const layerB = document.getElementById("layerB");
  
  let isLayerAActive = true;

  function rotateFlyers() {
    // Check if we just finished showing the very last flyer in the playlist
    if (currentIndex === flyerPlaylist.length - 1) {
      // Force a reload from the server to pull down code or image updates
      location.reload();
      return; 
    }

    // Otherwise, move to the next image index
    currentIndex++;
    const nextImageSrc = flyerPlaylist[currentIndex];

    if (isLayerAActive) {
      layerB.src = nextImageSrc;
      setTimeout(() => {
        layerA.className = "flyer-layer hidden";
        layerB.className = "flyer-layer active";
      }, 50);
    } else {
      layerA.src = nextImageSrc;
      setTimeout(() => {
        layerB.className = "flyer-layer hidden";
        layerA.className = "flyer-layer active";
      }, 50);
    }

    isLayerAActive = !isLayerAActive;
  }

  // Fallback safety: If there is only 1 flyer, reload the page after the duration 
  // to check if new files have been added to the playlist.
  if (flyerPlaylist.length > 1) {
    setInterval(rotateFlyers, displayDuration);
  } else {
    setTimeout(() => { location.reload(); }, displayDuration);
  }
</script>

</body>
</html>
