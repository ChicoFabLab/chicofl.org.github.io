<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maker Radio Marquee</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background-color: #000000; /* Black background matches the B&W flyer aesthetic */
  }
  .flyer-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    width: 100vw;
  }
  img.flyer-image {
    max-height: 100%;
    max-width: 100%;
    object-fit: contain; /* Keeps original 768x1024 aspect ratio without distortion */
    transition: opacity 0.5s ease-in-out; /* Smooth fade transition between flyers */
    opacity: 1;
  }
  .fade-out {
    opacity: 0;
  }
</style>
</head>
<body>

  <div class="flyer-container">
    <img id="signage-display" src="flyer1.png" alt="Digital Signage Flyer" class="flyer-image">
  </div>

<script>
  // --- CONFIGURATION ---
  // 1. Add your filenames to this array. Order determines playback order.
  const flyerPlaylist = [
    "flyer1.png", // Run4Salmon Fundraiser
    "flyer2.png"  // Maker Radio Live Music
  ];

  // 2. Set the display duration per flyer (in milliseconds). 20000 ms = 20 seconds.
  const displayDuration = 20000; 
  // ---------------------

  let currentIndex = 0;
  const displayImg = document.getElementById("signage-display");

  function rotateFlyers() {
    // 1. Start fade out
    displayImg.classList.add("fade-out");

    // 2. Wait for fade-out animation (500ms) to finish, then swap source and fade back in
    setTimeout(() => {
      // Move to next image, looping back to 0 if at the end of the array
      currentIndex = (currentIndex + 1) % flyerPlaylist.length;
      
      displayImg.src = flyerPlaylist[currentIndex];
      
      // Remove fade class to reveal new image
      displayImg.classList.remove("fade-out");
    }, 500); 
  }

  // Only start the interval if there is more than one flyer in the playlist
  if (flyerPlaylist.length > 1) {
    setInterval(rotateFlyers, displayDuration);
  }
</script>

</body>
</html>
