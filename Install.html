<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GateKeeper WebApp Installer</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { 
            background: #2ea44f; color: white; border: none; padding: 10px 20px; 
            font-size: 16px; border-radius: 6px; cursor: pointer; transition: background 0.2s;
        }
        button:hover { background: #2c974b; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .status { margin-top: 10px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h2>GateKeeper WebApp</h2>
    <p>Click below to install <strong>WebApp.html</strong> directly.</p>
    
    <button id="downloadBtn">Download WebApp</button>
    <div id="status" class="status"></div>
</div>

<script>
    const GITHUB_URL = 'https://raw.githubusercontent.com/ChicoFabLab/chicofl.org.github.io/refs/heads/main/WebApp.html';
    const FILE_NAME = 'WebApp.html';

    document.getElementById('downloadBtn').addEventListener('click', async () => {
        const btn = document.getElementById('downloadBtn');
        const status = document.getElementById('status');
        
        try {
            btn.disabled = true;
            status.innerText = "Fetching from GitHub...";

            // 1. Fetch the data
            const response = await fetch(GITHUB_URL);
            if (!response.ok) throw new Error('Could not fetch file');
            
            const blob = await response.blob();

            // 2. Create a local URL for the blob data
            const url = window.URL.createObjectURL(blob);

            // 3. Create a temporary anchor element
            const a = document.createElement('a');
            a.href = url;
            a.download = FILE_NAME; // The magic attribute
            document.body.appendChild(a);
            
            // 4. Trigger the download
            a.click();

            // 5. Clean up
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
            
            status.innerText = "Download started!";
        } catch (err) {
            status.innerText = "Error: " + err.message;
            console.error(err);
        } finally {
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
